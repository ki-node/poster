name: Quality gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Static, unit and browser checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run static checks, unit tests and production build
        run: npm run check

      - name: Verify reproducible embedded output
        run: npm run test:reproducible

      - name: Install browser engines
        run: npx playwright install --with-deps chromium webkit

      - name: Run mobile and desktop browser tests
        id: browser-tests
        run: npm run test:e2e:ci

      - name: Verify checks leave the repository unchanged
        run: |
          git diff --exit-code
          test -z "$(git status --porcelain --untracked-files=all)"

      - name: Upload browser failure diagnostics
        if: ${{ always() && steps.browser-tests.outcome == 'failure' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: browser-failure-diagnostics
          path: |
            playwright-report
            test-results
          if-no-files-found: warn
          retention-days: 7
